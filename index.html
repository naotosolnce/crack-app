<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<meta name="description" content="Which side is heavier? A party game to spark conversations.">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖️</text></svg>">
<title>CRACK!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&family=Noto+Sans+JP:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--bg2:#151520;--bg3:#1e1e2e;
  --tx:#f0eef6;--tx2:#a8a4b8;--tx3:#6b6880;
  --acc:#f5c542;--acc2:#ffd96a;--acc-dim:#3d3520;
  --blue:#4a9eff;--red:#ff6b6b;--green:#5cdb95;
  --radius:16px;--radius-sm:10px;
  --font:'Nunito','Noto Sans JP',sans-serif;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{
  height:100%;background:var(--bg);color:var(--tx);
  font-family:var(--font);overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}
body{display:flex;flex-direction:column}

#app{
  flex:1;display:flex;flex-direction:column;
  max-width:480px;width:100%;margin:0 auto;
  padding:calc(var(--safe-top) + 8px) 16px calc(var(--safe-bottom) + 16px);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}

.screen{display:none;flex-direction:column;flex:1}
.screen.active{display:flex}

/* ===== SPLASH ===== */
.splash{align-items:center;justify-content:center;text-align:center;gap:24px}
.splash-icon{font-size:72px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.splash h1{font-size:32px;font-weight:900;letter-spacing:-1px;line-height:1.1}
.splash h1 .accent{color:var(--acc)}
.splash p{font-size:15px;color:var(--tx2);line-height:1.6;max-width:280px}
.lang-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px}
.lang-btn{
  padding:8px 18px;border-radius:var(--radius-sm);border:1.5px solid var(--bg3);
  background:var(--bg2);color:var(--tx2);font-size:14px;font-family:var(--font);
  cursor:pointer;transition:all .15s;
}
.lang-btn:hover,.lang-btn.active{border-color:var(--acc);color:var(--acc);background:var(--acc-dim)}
.start-btn{
  margin-top:16px;padding:16px 56px;border-radius:var(--radius);border:none;
  background:var(--acc);color:#0a0a0f;font-size:18px;font-weight:800;
  font-family:var(--font);cursor:pointer;letter-spacing:0.5px;
  transition:transform .1s;
}
.start-btn:active{transform:scale(0.96)}

/* ===== GAME ===== */
.game-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 0 12px;
}
.stat{font-size:13px;color:var(--tx2)}
.stat strong{color:var(--tx);font-weight:800}
.streak-pill{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:20px;
  background:var(--acc-dim);color:var(--acc);font-size:12px;font-weight:600;
}
.diff-pill{
  align-self:center;padding:4px 14px;border-radius:20px;
  font-size:12px;font-weight:600;margin-bottom:6px;
}
.diff-hard{background:#3d1a1a;color:#ff8a8a}
.diff-med{background:#3d3520;color:#ffd96a}
.diff-easy{background:#1a3d2a;color:#5cdb95}
.q-title{text-align:center;font-size:20px;font-weight:800;margin-bottom:16px}

.battle-card{
  background:var(--bg2);border-radius:var(--radius);
  padding:6px;display:flex;flex-direction:column;gap:6px;
}
.side{
  display:flex;align-items:center;gap:12px;
  padding:16px;border-radius:var(--radius-sm);
  border:2px solid transparent;cursor:pointer;
  transition:all .15s;position:relative;overflow:hidden;
}
.side::before{
  content:'';position:absolute;inset:0;opacity:0;
  transition:opacity .15s;border-radius:inherit;
}
.side:active{transform:scale(0.98)}
.side-a::before{background:linear-gradient(135deg,rgba(74,158,255,.12),transparent)}
.side-b::before{background:linear-gradient(135deg,rgba(255,107,107,.12),transparent)}
.side-c::before{background:linear-gradient(135deg,rgba(92,219,149,.12),transparent)}
.side:hover::before{opacity:1}
.side.chosen-a{border-color:var(--blue);background:rgba(74,158,255,.08)}
.side.chosen-b{border-color:var(--red);background:rgba(255,107,107,.08)}
.side.chosen-c{border-color:var(--green);background:rgba(92,219,149,.08)}
.side.winner{border-color:var(--green);background:rgba(92,219,149,.08)}
.side .emoji{font-size:42px;line-height:1;flex-shrink:0;z-index:1}
.side .meta{flex:1;z-index:1}
.side .animal-name{font-size:16px;font-weight:700;line-height:1.2}
.side .animal-sub{font-size:12px;color:var(--tx3);margin-top:2px}
.num-badge{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-width:48px;height:48px;border-radius:var(--radius-sm);
  background:var(--bg3);z-index:1;
}
.num-badge .num{font-size:22px;font-weight:900;line-height:1;color:var(--acc)}
.num-badge .unit{font-size:10px;color:var(--tx3);margin-top:1px}
.vs-divider{
  text-align:center;font-size:14px;font-weight:800;
  color:var(--tx3);letter-spacing:6px;padding:2px 0;
}

/* ===== RESULT ===== */
.result-verdict{
  text-align:center;font-size:24px;font-weight:900;margin:16px 0 12px;
}
.result-verdict.correct{color:var(--green)}
.result-verdict.wrong{color:var(--red)}
.bars{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-label{font-size:11px;color:var(--tx2);min-width:70px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:28px;border-radius:6px;overflow:hidden;background:var(--bg3)}
.bar-fill{
  height:100%;border-radius:6px;display:flex;align-items:center;
  justify-content:center;font-size:12px;font-weight:700;color:#fff;
  min-width:40px;transition:width .6s cubic-bezier(.4,0,.2,1);
}
.bar-fill.ba{background:linear-gradient(90deg,#4a9eff,#6bb3ff)}
.bar-fill.bb{background:linear-gradient(90deg,#ff6b6b,#ff9494)}
.bar-fill.bc{background:linear-gradient(90deg,#5cdb95,#7de8ad)}
.winner-text{text-align:center;font-size:15px;font-weight:700;margin-bottom:4px}
.gap-text{text-align:center;font-size:13px;color:var(--tx2);margin-bottom:12px}
.size-compare{
  display:flex;align-items:flex-end;justify-content:center;gap:24px;
  padding:16px 12px 8px;margin-bottom:12px;
  background:var(--bg2);border-radius:var(--radius-sm);
  position:relative;overflow:hidden;
}
.size-compare::before{
  content:'';position:absolute;bottom:8px;left:12px;right:12px;
  height:1px;background:var(--tx3);opacity:0.3;
}
.size-col{display:flex;flex-direction:column;align-items:center;gap:4px}
.size-emoji{transition:font-size .4s}
.size-label{font-size:10px;color:var(--tx3);text-align:center;line-height:1.3}
.size-label strong{color:var(--tx2);font-weight:700}
.trap-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:6px 14px;border-radius:20px;
  font-size:13px;font-weight:700;
  background:rgba(245,197,66,0.12);color:var(--acc);
  margin:8px auto 12px;text-align:center;
}
.human-ref{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  opacity:0.4;
}
.human-ref .size-label{font-size:9px}
.fact-card{
  background:var(--bg2);border-radius:var(--radius-sm);
  padding:14px 16px;margin-bottom:8px;
}
.fact-card p{font-size:13px;color:var(--tx2);line-height:1.7;margin-bottom:6px}
.fact-card p:last-child{margin-bottom:0}
.fact-card .emoji-sm{font-size:14px;margin-right:4px}
.source-text{font-size:10px;color:var(--tx3);line-height:1.6;padding:0 4px;margin-bottom:16px}
.next-btn{
  align-self:center;padding:14px 56px;border-radius:var(--radius);border:none;
  background:var(--bg3);color:var(--tx);font-size:16px;font-weight:700;
  font-family:var(--font);cursor:pointer;transition:all .15s;
  margin-bottom:16px;
}
.next-btn:active{transform:scale(0.96);background:var(--acc-dim)}

/* Glass break effect */
.glass-overlay{
  position:fixed;inset:0;z-index:999;pointer-events:none;
  overflow:hidden;
}
.glass-shard{
  position:absolute;
  background:rgba(200,220,255,0.15);
  border:1px solid rgba(255,255,255,0.25);
  animation:shardFall 0.8s cubic-bezier(.25,.46,.45,.94) forwards;
}
@keyframes shardFall{
  0%{transform:translate(0,0) rotate(0deg);opacity:1}
  100%{transform:translate(var(--dx),var(--dy)) rotate(var(--rot));opacity:0}
}
.crack-line{
  position:absolute;
  background:rgba(255,255,255,0.4);
  transform-origin:center;
  animation:crackFlash 0.5s ease-out forwards;
}
@keyframes crackFlash{
  0%{opacity:1;transform:scaleX(0)}
  30%{opacity:1;transform:scaleX(1)}
  100%{opacity:0;transform:scaleX(1)}
}
.impact-ring{
  position:absolute;border-radius:50%;
  border:2px solid rgba(255,255,255,0.3);
  animation:ringExpand 0.6s ease-out forwards;
}
@keyframes ringExpand{
  0%{transform:scale(0);opacity:1}
  100%{transform:scale(3);opacity:0}
}
.heavy-emoji-fall{
  position:absolute;z-index:1000;
  animation:emojiSlam 0.5s cubic-bezier(.6,.04,.98,.34) forwards;
}
@keyframes emojiSlam{
  0%{transform:translateY(-120px) scale(1.5);opacity:0.8}
  70%{transform:translateY(0) scale(1.8);opacity:1}
  85%{transform:translateY(-10px) scale(1.6)}
  100%{transform:translateY(0) scale(1.5);opacity:1}
}
.screen-shake{
  animation:shake 0.3s ease-in-out;
}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px) translateY(2px)}
  40%{transform:translateX(5px) translateY(-2px)}
  60%{transform:translateX(-4px) translateY(1px)}
  80%{transform:translateX(3px)}
}
</style>
</head>
<body>

function pick(a){return a[Math.floor(Math.random()*a.length)]}
function fmtKg(k){return k>=1000?(k/1000).toFixed(1)+"t":k>=1?Math.round(k*10)/10+"kg":Math.round(k*1000)+"g"}
function getFact(item){return item.ff?item.ff[Math.floor(Math.random()*item.ff.length)]:item.f||""}

function pickN(x,y){
  const r=y.w/x.w;
  if(r>10) return Math.floor(Math.random()*3)+6;
  if(r>4) return Math.floor(Math.random()*3)+3;
  if(r>2) return Math.floor(Math.random()*2)+2;
  if(r>1.2) return Math.floor(Math.random()*2)+1;
  return 1;
}

function genQ(){
  for(let i=0;i<800;i++){
    const a=pick(animals),b=pick(animals),h=pick(humans);
    if(a.n===b.n)continue;
    const cA=pickN(a,b),cB=pickN(b,a);
    // Human count: scale to be competitive with animals
    const avgAnimal=(a.w*cA+b.w*cB)/2;
    let cH=Math.max(1,Math.round(avgAnimal/h.w));
    cH=Math.max(1,cH+Math.floor(Math.random()*3)-1);
    if(cH>20)continue;
    const tA=a.w*cA,tB=b.w*cB,tH=h.w*cH;
    if(cA>8||cB>8)continue;
    const totals=[{id:'a',t:tA},{id:'b',t:tB},{id:'c',t:tH}];
    totals.sort((x,y)=>x.t-y.t);
    const lightest=totals[0], heaviest=totals[2];
    const absgap=heaviest.t-lightest.t;
    const maxT=heaviest.t;
    // All three should be somewhat close
    const spread=(heaviest.t-lightest.t)/maxT;
    if(spread>0.50)continue;
    // Gap between lightest and middle should not be too big
    const gap12=Math.abs(totals[1].t-totals[0].t)/maxT;
    const gap23=Math.abs(totals[2].t-totals[1].t)/maxT;
    if(gap12>0.35||gap23>0.35)continue;
    if(absgap>800)continue;
    const key=[a.n,cA,b.n,cB,h.n,cH].sort().join('|');
    if(usedKeys.has(key))continue;
    usedKeys.add(key);
    const minDiff=Math.min(gap12,gap23);
    const d=minDiff<0.06?"hard":minDiff<0.15?"med":"easy";
    return {a,b,c:h,cA,cB,cC:cH,tA,tB,tC:tH,d,
      light:lightest.id,heavy:heaviest.id};
  }
  usedKeys.clear(); return genQ();
}

function countText(n){
  if(lang==='ja') return n + L.unit;
  if(lang==='zh') return n + L.unit;
  if(lang==='ko') return n + L.unit;
  return '×' + n;
}

function retryQ(){
  answered=false;
  const dClass = cur.d==='hard'?'diff-hard':cur.d==='med'?'diff-med':'diff-easy';
  const dText = cur.d==='hard'?L.hard:cur.d==='med'?L.med:L.easy;
  document.getElementById('stat-score').innerHTML = '<strong>'+correct+'</strong> '+L.score;
  document.getElementById('stat-round').innerHTML = '<strong>'+total+'</strong> '+L.round;
  document.getElementById('streak-area').innerHTML = streak>=3
    ? '<span class="streak-pill">🔥 '+streak+' '+L.streak+'</span>' : '';
  document.getElementById('diff-area').innerHTML = '<span class="diff-pill '+dClass+'">'+dText+'</span>';
  document.getElementById('q-title').textContent = L.question;
  const q=cur;
  const unitText=lang==='ja'||lang==='zh'||lang==='ko'?L.unit:'';
  const cLabel=(item,cnt)=>cnt>1?cnt+(unitText||'x'):'1'+(unitText||'');

  document.getElementById('battle-card').innerHTML = `
    <div class="side side-a" onclick="answer('a')" id="sa">
      <div class="emoji">${q.a.i}</div>
      <div class="meta"><div class="animal-name">${q.a.n}</div></div>
      <div class="num-badge"><div class="num">${q.cA}</div><div class="unit">${unitText}</div></div>
    </div>
    <div class="vs-divider">${L.vs}</div>
    <div class="side side-b" onclick="answer('b')" id="sb">
      <div class="emoji">${q.b.i}</div>
      <div class="meta"><div class="animal-name">${q.b.n}</div></div>
      <div class="num-badge"><div class="num">${q.cB}</div><div class="unit">${unitText}</div></div>
    </div>
    <div class="vs-divider">${L.vs}</div>
    <div class="side side-c" onclick="answer('c')" id="sc">
      <div class="emoji">${q.c.i}</div>
      <div class="meta"><div class="animal-name">${q.c.n}</div></div>
      <div class="num-badge"><div class="num">${q.cC}</div><div class="unit">${lang==='ja'?'人':unitText}</div></div>
    </div>`;
  document.getElementById('result-area').innerHTML = '';
}

function nextQ(){
  answered=false;
  cur=genQ();
  const q=cur;
  total++;

  const dClass = q.d==='hard'?'diff-hard':q.d==='med'?'diff-med':'diff-easy';
  const dText = q.d==='hard'?L.hard:q.d==='med'?L.med:L.easy;

  document.getElementById('stat-score').innerHTML = '<strong>'+correct+'</strong> '+L.score;
  document.getElementById('stat-round').innerHTML = '<strong>'+total+'</strong> '+L.round;
  document.getElementById('streak-area').innerHTML = streak>=3
    ? '<span class="streak-pill">🔥 '+streak+' '+L.streak+'</span>' : '';
  document.getElementById('diff-area').innerHTML = '<span class="diff-pill '+dClass+'">'+dText+'</span>';
  document.getElementById('q-title').textContent = L.question;

  const unitText=lang==='ja'||lang==='zh'||lang==='ko'?L.unit:'';
  const cLabel=(item,cnt)=>cnt>1?cnt+(unitText||'x'):'1'+(unitText||'');

  document.getElementById('battle-card').innerHTML = `
    <div class="side side-a" onclick="answer('a')" id="sa">
      <div class="emoji">${q.a.i}</div>
      <div class="meta"><div class="animal-name">${q.a.n}</div></div>
      <div class="num-badge"><div class="num">${q.cA}</div><div class="unit">${unitText}</div></div>
    </div>
    <div class="vs-divider">${L.vs}</div>
    <div class="side side-b" onclick="answer('b')" id="sb">
      <div class="emoji">${q.b.i}</div>
      <div class="meta"><div class="animal-name">${q.b.n}</div></div>
      <div class="num-badge"><div class="num">${q.cB}</div><div class="unit">${unitText}</div></div>
    </div>
    <div class="vs-divider">${L.vs}</div>
    <div class="side side-c" onclick="answer('c')" id="sc">
      <div class="emoji">${q.c.i}</div>
      <div class="meta"><div class="animal-name">${q.c.n}</div></div>
      <div class="num-badge"><div class="num">${q.cC}</div><div class="unit">${lang==='ja'?'人':unitText}</div></div>
    </div>`;
  document.getElementById('result-area').innerHTML = '';
}

function answer(ch){
  if(answered)return;
  answered=true;
  const q=cur;
  const ok=ch===q.light;
  if(ok){correct++;streak++;}else{streak=0;}

  document.getElementById('s'+ch).classList.add('chosen-'+ch);
  document.getElementById('s'+q.light).classList.add('winner');

  // Glass break on heavy side
  const heavySide = document.getElementById('s'+q.heavy);
  const rect = heavySide.getBoundingClientRect();
  const items={a:q.a,b:q.b,c:q.c};
  const counts={a:q.cA,b:q.cB,c:q.cC};
  const totals={a:q.tA,b:q.tB,c:q.tC};
  glassBreak(rect.left+rect.width/2, rect.top+rect.height/2, items[q.heavy].i);

  document.getElementById('stat-score').innerHTML = '<strong>'+correct+'</strong> '+L.score;
  document.getElementById('streak-area').innerHTML = streak>=3
    ? '<span class="streak-pill">🔥 '+streak+' '+L.streak+'</span>' : '';

  const mx=Math.max(q.tA,q.tB,q.tC);
  const pA=Math.round((q.tA/mx)*100);
  const pB=Math.round((q.tB/mx)*100);
  const pC=Math.round((q.tC/mx)*100);
  const heavyItem=items[q.heavy];
  const lightItem=items[q.light];

  // Sort all three for display
  const sorted=[{id:'a',item:q.a,cnt:q.cA,t:q.tA,cls:'ba'},{id:'b',item:q.b,cnt:q.cB,t:q.tB,cls:'bb'},{id:'c',item:q.c,cnt:q.cC,t:q.tC,cls:'bc'}];
  sorted.sort((x,y)=>y.t-x.t);

  // Size comparison
  const allH=[q.a.h||100,q.b.h||100,q.c.h||100];
  const maxH=Math.max(...allH);
  const szs=allH.map(h=>Math.max(18,Math.round((h/maxH)*56)));

  const barsHtml = sorted.map(s=>{
    const pct=Math.round((s.t/mx)*100);
    const perUnit=s.cnt>1?'<div style="text-align:right;font-size:11px;color:var(--tx3);margin:-4px 0 2px">(1'+(lang==='ja'?(s.id==='c'?'人あたり':'頭あたり'):' each')+' '+fmtKg(s.item.w)+')</div>':'';
    return '<div class="bar-row"><span class="bar-label">'+s.item.i+' '+s.item.n+(s.cnt>1?' ×'+s.cnt:'')+'</span><div class="bar-track"><div class="bar-fill '+s.cls+'" style="width:'+pct+'%">'+fmtKg(s.t)+'</div></div></div>'+perUnit;
  }).join('');

  document.getElementById('result-area').innerHTML = `
    <div class="result-verdict ${ok?'correct':'wrong'}">${ok?L.correct:L.wrong}</div>
    <div class="bars">${barsHtml}</div>
    <div class="winner-text">${heavyItem.i} ${heavyItem.n} ${L.win}</div>
    <div class="gap-text">${L.gap} ${fmtKg(Math.abs(totals[q.heavy]-totals[q.light]))}</div>
    <div class="size-compare">
      <div class="size-col">
        <div class="size-emoji" style="font-size:${szs[0]}px">${q.a.i}</div>
        <div class="size-label"><strong>${q.a.h}cm</strong><br>${q.a.n}</div>
      </div>
      <div class="size-col">
        <div class="size-emoji" style="font-size:${szs[1]}px">${q.b.i}</div>
        <div class="size-label"><strong>${q.b.h}cm</strong><br>${q.b.n}</div>
      </div>
      <div class="size-col">
        <div class="size-emoji" style="font-size:${szs[2]}px">${q.c.i}</div>
        <div class="size-label"><strong>${q.c.h}cm</strong><br>${q.c.n}</div>
      </div>
    </div>
    <div class="fact-card">
      <p><span class="emoji-sm">💡</span>${sorted[0].item.n}：${getFact(sorted[0].item)}</p>
      <p><span class="emoji-sm">💡</span>${sorted[1].item.n}：${getFact(sorted[1].item)}</p>
      <p><span class="emoji-sm">💡</span>${sorted[2].item.n}：${getFact(sorted[2].item)}</p>
    </div>
    <div class="source-text">📖 ${L.src}: ${sorted.map(s=>s.item.s).join(' / ')}</div>
    <button class="next-btn" onclick="${ok?'nextQ()':'startGame()'}" style="${ok?'':'background:#3d1a1a;color:#ff8a8a;'}">${ok?L.next:L.retry}</button>`;

  document.getElementById('result-area').scrollIntoView({behavior:'smooth',block:'end'});
}

function glassBreak(cx, cy, emoji) {
  const app = document.getElementById('app');
  app.classList.add('screen-shake');
  setTimeout(() => app.classList.remove('screen-shake'), 400);

  const overlay = document.createElement('div');
  overlay.className = 'glass-overlay';
  document.body.appendChild(overlay);

  // Falling emoji slam
  const em = document.createElement('div');
  em.className = 'heavy-emoji-fall';
  em.style.cssText = `left:${cx-30}px;top:${cy-30}px;font-size:60px;`;
  em.textContent = emoji;
  overlay.appendChild(em);

  // Impact ring
  const ring = document.createElement('div');
  ring.className = 'impact-ring';
  ring.style.cssText = `left:${cx-40}px;top:${cy-40}px;width:80px;height:80px;`;
  overlay.appendChild(ring);

  // Crack lines radiating from center
  for (let i = 0; i < 8; i++) {
    const crack = document.createElement('div');
    crack.className = 'crack-line';
    const angle = (i / 8) * 360 + (Math.random() * 20 - 10);
    const len = 40 + Math.random() * 80;
    crack.style.cssText = `left:${cx}px;top:${cy}px;width:${len}px;height:1.5px;transform-origin:left center;transform:rotate(${angle}deg);animation-delay:${i*0.02}s;`;
    overlay.appendChild(crack);
  }

  // Flying glass shards
  for (let i = 0; i < 18; i++) {
    const shard = document.createElement('div');
    shard.className = 'glass-shard';
    const w = 8 + Math.random() * 20;
    const h = 6 + Math.random() * 16;
    const angle = Math.random() * 360;
    const dist = 60 + Math.random() * 160;
    const dx = Math.cos(angle * Math.PI / 180) * dist;
    const dy = Math.sin(angle * Math.PI / 180) * dist + 40;
    const rot = (Math.random() - 0.5) * 720;
    shard.style.cssText = `left:${cx - w/2 + (Math.random()-0.5)*30}px;top:${cy - h/2 + (Math.random()-0.5)*20}px;width:${w}px;height:${h}px;--dx:${dx}px;--dy:${dy}px;--rot:${rot}deg;animation-delay:${Math.random()*0.1}s;clip-path:polygon(${Math.random()*30}% 0%, 100% ${Math.random()*40}%, ${60+Math.random()*40}% 100%, 0% ${60+Math.random()*40}%);`;
    overlay.appendChild(shard);
  }

  setTimeout(() => overlay.remove(), 1000);
}
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js');}
